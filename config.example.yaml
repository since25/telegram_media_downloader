api_hash: your_api_hash
api_id: your_api_id
chat:
- chat_id: telegram_chat_id
  last_read_message_id: 0
file_formats:
  audio:
  - all
  document:
  - all
  video:
  - all
file_path_prefix:
- chat_title
- media_datetime
media_types:
- audio
- photo
- video
- document
- voice
- video_note
enable_web: false
web_host: 0.0.0.0
web_port: 5000
# web_login_secret: set-a-strong-unique-password
channel_library:
  # Packages wait until their full known size fits while this much free disk remains.
  min_free_disk_bytes: 3221225472
  full_scan_batch_size: 50
  full_scan_delay_min_sec: 4
  full_scan_delay_max_sec: 6
  incremental_scan_batch_size: 50
  incremental_scan_delay_min_sec: 1
  incremental_scan_delay_max_sec: 2
  # One global 5-field cron for all indexed channels; empty disables automation.
  incremental_scan_cron: ""
  incremental_scan_timezone: Asia/Shanghai
  transient_retry_delays_sec: [5, 15, 45]
# in linux please use /
# save_path: E:\github\telegram_media_downloader
