<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Telegram Media Downloader</title>
  <link href="static/layui/css/layui.css" rel="stylesheet">
  <link href="static/css/index.css" rel="stylesheet">
</head>

<body>
  <div class="app-shell">
    <div class="layui-tab" lay-filter="telegram_media_downloader">
      <div class="header-title layui-tab-brief">
        <ul class="layui-tab-title">
          <li class="layui-this">Tasks</li>
          <li>Files</li>
          <li>Advanced Config</li>
        </ul>
        <div class="header-actions">
          <button type="button" class="layui-btn layui-btn-primary layui-btn-sm" id="logout_btn">Logout</button>
          <div class="stop-btn" id="download_state" data-value="{{ download_state }}" onclick="download_state_change(this)">
            {{ download_state }}
          </div>
        </div>
      </div>

      <div class="layui-tab-content">
        <div class="layui-tab-item layui-show">
          <div class="task-summary" id="task_dashboard_summary">
            <div class="task-summary-item">
              <span class="summary-label">Active</span>
              <strong id="summary_active_tasks">0</strong>
            </div>
            <div class="task-summary-item">
              <span class="summary-label">Completed</span>
              <strong id="summary_completed_tasks">0</strong>
            </div>
            <div class="task-summary-item">
              <span class="summary-label">State</span>
              <strong id="summary_download_state">{{ download_state }}</strong>
            </div>
            <div class="task-summary-item">
              <span class="summary-label">Speed</span>
              <strong id="summary_download_speed">0.00 B/s</strong>
            </div>
          </div>
          <div class="task-submit">
            <input type="text" id="web_task_link" autocomplete="off" class="layui-input" placeholder="https://t.me/c/...">
            <select id="web_task_mode">
              <option value="auto">Preview</option>
              <option value="prescan">Prescan</option>
            </select>
            <input type="number" id="web_task_count" class="layui-input task-count-input" min="1" max="10000" value="2000" placeholder="messages" style="display:none;">
            <button type="button" class="layui-btn" id="submit_task_btn">Submit</button>
            <span id="task_submit_status" class="task-submit-status"></span>
          </div>
          <table class="layui-hide" id="task_list" lay-filter="task_list"></table>
          <div class="task-detail-error" id="task_detail_error" hidden></div>
          <table class="layui-hide" id="task_detail_list" lay-filter="task_detail_list"></table>
          <script type="text/html" id="task_actions" lay-filter="task_actions">
            {% raw %}
            {{# if (d.needs_confirmation) { }}
              <button type="button" class="layui-btn layui-btn-xs" lay-event="confirm">Start</button>
              <button type="button" class="layui-btn layui-btn-primary layui-btn-xs" lay-event="cancel">Cancel</button>
            {{# } else { }}
              <span class="task-action-empty">-</span>
            {{# } }}
            {% endraw %}
          </script>
          <script type="text/html" id="prescan_package_actions" lay-filter="prescan_package_actions">
            {% raw %}
            {{# if (d.selected) { }}
              <button type="button" class="layui-btn layui-btn-primary layui-btn-xs" lay-event="deselect">Exclude</button>
            {{# } else { }}
              <button type="button" class="layui-btn layui-btn-xs" lay-event="select">Include</button>
            {{# } }}
            {% endraw %}
          </script>
          <div class="prescan-controls" id="prescan_controls" hidden>
            <button type="button" class="layui-btn layui-btn-sm" id="prescan_select_all">Select all</button>
            <button type="button" class="layui-btn layui-btn-sm layui-btn-primary" id="prescan_clear_all">Clear all</button>
            <span class="prescan-summary" id="prescan_summary">0 packages selected</span>
            <button type="button" class="layui-btn layui-btn-sm" id="prescan_download">Download selected</button>
          </div>
        </div>
        <div class="layui-tab-item">
          <table class="layui-hide" id="download_list" lay-filter="download_list"></table>
          <table class="layui-hide" id="already_download_list" lay-filter="already_download_list"></table>
        </div>
        <div class="layui-tab-item">
        <form class="layui-form config-form" action="" lay-filter="advanced_config_form">
          <fieldset class="layui-elem-field">
            <legend>Storage</legend>
            <div class="layui-field-box">
              <div class="layui-row layui-col-space16">
                <div class="layui-col-md6">
                  <label class="layui-form-label">Save path</label>
                  <div class="layui-input-block">
                    <input type="text" id="save_path" autocomplete="off" class="layui-input">
                  </div>
                </div>
                <div class="layui-col-md3">
                  <label class="layui-form-label">Date format</label>
                  <div class="layui-input-block">
                    <input type="text" id="date_format" autocomplete="off" class="layui-input">
                  </div>
                </div>
                <div class="layui-col-md3">
                  <label class="layui-form-label">Start timeout</label>
                  <div class="layui-input-block">
                    <input type="number" id="start_timeout" min="1" class="layui-input">
                  </div>
                </div>
              </div>
            </div>
          </fieldset>

          <fieldset class="layui-elem-field">
            <legend>Concurrency</legend>
            <div class="layui-field-box">
              <div class="layui-row layui-col-space16">
                <div class="layui-col-md3">
                  <label class="layui-form-label">Workers</label>
                  <div class="layui-input-block">
                    <input type="number" id="max_download_task" min="1" max="32" class="layui-input">
                  </div>
                </div>
                <div class="layui-col-md3">
                  <label class="layui-form-label">TG streams</label>
                  <div class="layui-input-block">
                    <input type="number" id="max_concurrent_transmissions" min="1" max="200" class="layui-input">
                  </div>
                </div>
                <div class="layui-col-md6 toggle-row">
                  <input type="checkbox" id="drop_no_audio_video" lay-skin="switch" lay-text="Drop muted video|Keep muted video">
                  <input type="checkbox" id="enable_download_txt" lay-skin="switch" lay-text="Text on|Text off">
                  <input type="checkbox" id="hide_file_name" lay-skin="switch" lay-text="Hide name|Show name">
                </div>
              </div>
            </div>
          </fieldset>

          <fieldset class="layui-elem-field">
            <legend>Media</legend>
            <div class="layui-field-box">
              <div class="config-checks" id="media_type_checks"></div>
              <div class="layui-row layui-col-space16 format-row">
                <div class="layui-col-md4">
                  <label class="layui-form-label">Audio formats</label>
                  <div class="layui-input-block">
                    <input type="text" id="format_audio" autocomplete="off" class="layui-input">
                  </div>
                </div>
                <div class="layui-col-md4">
                  <label class="layui-form-label">Document formats</label>
                  <div class="layui-input-block">
                    <input type="text" id="format_document" autocomplete="off" class="layui-input">
                  </div>
                </div>
                <div class="layui-col-md4">
                  <label class="layui-form-label">Video formats</label>
                  <div class="layui-input-block">
                    <input type="text" id="format_video" autocomplete="off" class="layui-input">
                  </div>
                </div>
              </div>
            </div>
          </fieldset>

          <fieldset class="layui-elem-field">
            <legend>Naming</legend>
            <div class="layui-field-box">
              <div class="layui-row layui-col-space16">
                <div class="layui-col-md5">
                  <div class="config-checks" id="file_path_prefix_checks"></div>
                </div>
                <div class="layui-col-md5">
                  <div class="config-checks" id="file_name_prefix_checks"></div>
                </div>
                <div class="layui-col-md2">
                  <label class="layui-form-label">Separator</label>
                  <div class="layui-input-block">
                    <input type="text" id="file_name_prefix_split" autocomplete="off" class="layui-input">
                  </div>
                </div>
              </div>
            </div>
          </fieldset>

          <fieldset class="layui-elem-field">
            <legend>Upload</legend>
            <div class="layui-field-box">
              <div class="layui-row layui-col-space16">
                <div class="layui-col-md3">
                  <label class="layui-form-label">Adapter</label>
                  <div class="layui-input-block">
                    <select id="upload_adapter">
                      <option value="rclone">rclone</option>
                      <option value="aligo">aligo</option>
                    </select>
                  </div>
                </div>
                <div class="layui-col-md5">
                  <label class="layui-form-label">Remote dir</label>
                  <div class="layui-input-block">
                    <input type="text" id="remote_dir" autocomplete="off" class="layui-input">
                  </div>
                </div>
                <div class="layui-col-md4">
                  <label class="layui-form-label">Rclone path</label>
                  <div class="layui-input-block">
                    <input type="text" id="rclone_path" autocomplete="off" class="layui-input">
                  </div>
                </div>
              </div>
              <div class="layui-row layui-col-space16 upload-switch-row">
                <div class="layui-col-md12 toggle-row">
                  <input type="checkbox" id="enable_upload_file" lay-skin="switch" lay-text="Upload on|Upload off">
                  <input type="checkbox" id="before_upload_file_zip" lay-skin="switch" lay-text="Zip on|Zip off">
                  <input type="checkbox" id="after_upload_file_delete" lay-skin="switch" lay-text="Delete local|Keep local">
                  <input type="checkbox" id="after_upload_telegram_delete" lay-skin="switch" lay-text="Delete TG|Keep TG">
                </div>
              </div>
            </div>
          </fieldset>

          <fieldset class="layui-elem-field">
            <legend>Chats</legend>
            <div class="layui-field-box">
              <div id="chat_settings" class="chat-settings"></div>
            </div>
          </fieldset>

          <fieldset class="layui-elem-field">
            <legend>Web</legend>
            <div class="layui-field-box">
              <div class="layui-row layui-col-space16">
                <div class="layui-col-md5">
                  <label class="layui-form-label">Host</label>
                  <div class="layui-input-block">
                    <input type="text" id="web_host" autocomplete="off" class="layui-input">
                  </div>
                </div>
                <div class="layui-col-md3">
                  <label class="layui-form-label">Port</label>
                  <div class="layui-input-block">
                    <input type="number" id="web_port" min="1" max="65535" class="layui-input">
                  </div>
                </div>
                <div class="layui-col-md4 toggle-row">
                  <input type="checkbox" id="enable_web" lay-skin="switch" lay-text="Web on|Web off">
                </div>
              </div>
            </div>
          </fieldset>

          <div class="config-actions">
            <button type="button" class="layui-btn" id="save_config_btn">Save</button>
            <span id="config_save_status" class="config-save-status"></span>
          </div>
        </form>
        </div>
      </div>
    </div>
  </div>

  <div class="layui-footer">
    <div class="layui-row layui-col-space1">
      <div class="layui-col-md4">
        <p>Telegram Media Downloader V <b id="app_version">undefined</b></p>
      </div>
      <div class="layui-col-md5"></div>
      <div class="layui-col-md3">
        <div class="speed-box">
          <i class="layui-icon layui-icon-download-circle">
            <i id="download_speed_title"> 0.00 B/s </i>
          </i>
        </div>
      </div>
    </div>
  </div>

  <script src="static/layui/layui.js"></script>
  <script>
    layui.use(['table', 'element', 'form', 'layer'], function () {
      var table = layui.table;
      var element = layui.element;
      var form = layui.form;
      var layer = layui.layer;
      var $ = layui.$;
      var settingsCache = null;
      var settingsLoaded = false;
      var taskDashboardTimer = 0;
      var downloadListTimer = 0;
      var downloadedListTimer = 0;
      var statusTimer = 0;
      var selectedTaskId = null;
      var selectedTaskType = null;
      var lastTasksById = {};
      var detailColsType = null;
      var detailSignature = '';

      function escapeHtml(value) {
        return String(value == null ? '' : value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      var STATUS_META = {
        created: { cls: 'layui-bg-gray', label: 'created' },
        scanning: { cls: 'layui-bg-blue', label: 'scanning' },
        waiting_confirmation: { cls: 'layui-bg-cyan', label: 'waiting' },
        queued: { cls: 'layui-bg-blue', label: 'queued' },
        downloading: { cls: 'layui-bg-blue', label: 'downloading' },
        uploading: { cls: 'layui-bg-blue', label: 'uploading' },
        completed: { cls: 'layui-bg-green', label: 'completed' },
        completed_with_errors: { cls: 'layui-bg-orange', label: 'completed · errors' },
        failed: { cls: 'layui-bg-red', label: 'failed' },
        cancelled: { cls: 'layui-bg-gray', label: 'cancelled' }
      };

      function badge(status, cls, label, titleText) {
        var meta = STATUS_META[status] || { cls: cls || 'layui-bg-gray', label: label || status || '' };
        var title = escapeHtml(titleText || status || '');
        return '<span class="layui-badge ' + meta.cls + '" title="' + title + '">' + escapeHtml(meta.label) + '</span>';
      }

      function statusBadge(task) {
        return badge(task.status, null, null, task.error || task.status);
      }

      function fileStatusBadge(d) {
        return badge(d.status, null, null, d.error || d.status);
      }

      function progressClass(pct) {
        if (pct >= 100) { return 'mp-green'; }
        if (pct > 30) { return 'mp-blue'; }
        return 'mp-red';
      }

      function progressBar(pct, text) {
        pct = Math.max(0, Math.min(Math.round(pct), 100));
        var html = '<div class="mini-progress"><div class="mini-progress-bar ' + progressClass(pct) + '" style="width:' + pct + '%"></div></div>';
        if (text) { html += '<div class="mini-progress-text">' + escapeHtml(text) + '</div>'; }
        return html;
      }

      function taskProgressCell(task) {
        var total = Number(task.total_count || 0);
        if (total <= 0) { return '<span class="task-action-empty">-</span>'; }
        var done = Number(task.success_count || 0) + Number(task.failed_count || 0) + Number(task.skipped_count || 0);
        return progressBar(done / total * 100, done + ' / ' + total);
      }

      function countCell(task) {
        function seg(value, cls) {
          var n = Number(value || 0);
          var strong = (cls === 'cnt-fail' && n > 0) ? ' cnt-strong' : '';
          return '<span class="' + cls + strong + '">' + n + '</span>';
        }
        return seg(task.success_count, 'cnt-ok') + ' / ' + seg(task.failed_count, 'cnt-fail')
          + ' / ' + seg(task.skipped_count, 'cnt-skip') + ' / ' + seg(task.upload_success_count, 'cnt-up');
      }

      function fileProgressCell(d) {
        var pct = Number(d.download_progress || 0);
        var text = '';
        if (pct > 0 && pct < 100) { text = pct + '% · ' + (d.download_speed || ''); }
        return progressBar(pct, text);
      }

      function fileErrorCell(d) {
        if (!d.error) { return ''; }
        return '<span class="file-error">' + escapeHtml(d.error) + '</span>';
      }

      var FILE_DETAIL_COLS = [[
        { field: 'message_id', title: 'message', width: 100 },
        { field: 'status', title: 'status', width: 120, templet: fileStatusBadge },
        { field: 'filename', title: 'file name', minWidth: 160 },
        { field: 'total_size', title: 'size', width: 90 },
        { field: 'download_progress', title: 'progress', width: 150, templet: fileProgressCell },
        { field: 'error', title: 'error', minWidth: 140, templet: fileErrorCell }
      ]];

      function listText(value) {
        return (value || []).join(', ');
      }

      function switchValue(id, value) {
        $('#' + id).prop('checked', !!value);
      }

      function checkedValues(name) {
        return $('input[name="' + name + '"]:checked').map(function () {
          return this.value;
        }).get();
      }

      function splitValues(value) {
        return String(value || '').split(',').map(function (item) {
          return item.trim();
        }).filter(Boolean);
      }

      function renderChecks(container, name, options, selected, title) {
        var selectedMap = {};
        (selected || []).forEach(function (item) { selectedMap[item] = true; });
        var html = title ? '<div class="check-title">' + escapeHtml(title) + '</div>' : '';
        (options || []).forEach(function (item) {
          html += '<input type="checkbox" name="' + name + '" value="' + escapeHtml(item) + '" title="' + escapeHtml(item) + '"' + (selectedMap[item] ? ' checked' : '') + '>';
        });
        $(container).html(html);
      }

      function renderChatSettings(chats) {
        if (!chats || !chats.length) {
          $('#chat_settings').html('<div class="empty-config">No chat config</div>');
          return;
        }
        var html = '';
        chats.forEach(function (chat, index) {
          html += '<div class="chat-row" data-index="' + index + '">';
          html += '<div class="chat-id">' + escapeHtml(chat.chat_id) + '</div>';
          html += '<div><input type="number" class="layui-input chat-last-id" value="' + escapeHtml(chat.last_read_message_id || 0) + '"></div>';
          html += '<div><input type="text" class="layui-input chat-filter" value="' + escapeHtml(chat.download_filter || '') + '"></div>';
          html += '<div><input type="text" class="layui-input chat-upload" value="' + escapeHtml(chat.upload_telegram_chat_id || '') + '"></div>';
          html += '</div>';
        });
        $('#chat_settings').html(
          '<div class="chat-header"><span>Chat</span><span>Last read</span><span>Filter</span><span>Upload chat</span></div>' + html
        );
      }

      function fillSettings(settings) {
        settingsCache = settings;
        $('#save_path').val(settings.save_path || '');
        $('#date_format').val(settings.date_format || '');
        $('#start_timeout').val(settings.start_timeout || 60);
        $('#max_download_task').val(settings.max_download_task || 4);
        $('#max_concurrent_transmissions').val(settings.max_concurrent_transmissions || 10);
        $('#file_name_prefix_split').val(settings.file_name_prefix_split || '');
        $('#format_audio').val(listText((settings.file_formats || {}).audio));
        $('#format_document').val(listText((settings.file_formats || {}).document));
        $('#format_video').val(listText((settings.file_formats || {}).video));
        switchValue('drop_no_audio_video', settings.drop_no_audio_video);
        switchValue('enable_download_txt', settings.enable_download_txt);
        switchValue('hide_file_name', settings.hide_file_name);

        renderChecks('#media_type_checks', 'media_types', settings.options.media_types, settings.media_types, 'Media types');
        renderChecks('#file_path_prefix_checks', 'file_path_prefix', settings.options.file_path_prefix, settings.file_path_prefix, 'Folder parts');
        renderChecks('#file_name_prefix_checks', 'file_name_prefix', settings.options.file_name_prefix, settings.file_name_prefix, 'Filename parts');

        var upload = settings.upload_drive || {};
        $('#upload_adapter').val(upload.upload_adapter || 'rclone');
        $('#remote_dir').val(upload.remote_dir || '');
        $('#rclone_path').val(upload.rclone_path || '');
        switchValue('enable_upload_file', upload.enable_upload_file);
        switchValue('before_upload_file_zip', upload.before_upload_file_zip);
        switchValue('after_upload_file_delete', upload.after_upload_file_delete);
        switchValue('after_upload_telegram_delete', settings.after_upload_telegram_delete);

        var web = settings.web || {};
        $('#web_host').val(web.web_host || '0.0.0.0');
        $('#web_port').val(web.web_port || 5000);
        switchValue('enable_web', web.enable_web);
        renderChatSettings(settings.chats || []);
        form.render();
      }

      function loadSettings() {
        return $.ajax({
          url: 'api/settings',
          type: 'get',
          dataType: 'json',
          success: function (settings) {
            settingsLoaded = true;
            fillSettings(settings);
          }
        });
      }

      function readChatSettings() {
        var chats = [];
        $('#chat_settings .chat-row').each(function () {
          var index = Number(this.dataset.index);
          var source = (settingsCache.chats || [])[index] || {};
          chats.push({
            chat_id: source.chat_id,
            last_read_message_id: Number($(this).find('.chat-last-id').val() || 0),
            download_filter: $(this).find('.chat-filter').val() || '',
            upload_telegram_chat_id: $(this).find('.chat-upload').val() || ''
          });
        });
        return chats;
      }

      function settingsPayload() {
        return {
          save_path: $('#save_path').val(),
          media_types: checkedValues('media_types'),
          file_formats: {
            audio: splitValues($('#format_audio').val()),
            document: splitValues($('#format_document').val()),
            video: splitValues($('#format_video').val())
          },
          file_path_prefix: checkedValues('file_path_prefix'),
          file_name_prefix: checkedValues('file_name_prefix'),
          file_name_prefix_split: $('#file_name_prefix_split').val(),
          max_download_task: Number($('#max_download_task').val() || 4),
          max_concurrent_transmissions: Number($('#max_concurrent_transmissions').val() || 10),
          start_timeout: Number($('#start_timeout').val() || 60),
          date_format: $('#date_format').val(),
          hide_file_name: $('#hide_file_name').prop('checked'),
          drop_no_audio_video: $('#drop_no_audio_video').prop('checked'),
          enable_download_txt: $('#enable_download_txt').prop('checked'),
          after_upload_telegram_delete: $('#after_upload_telegram_delete').prop('checked'),
          upload_drive: {
            enable_upload_file: $('#enable_upload_file').prop('checked'),
            upload_adapter: $('#upload_adapter').val(),
            rclone_path: $('#rclone_path').val(),
            remote_dir: $('#remote_dir').val(),
            before_upload_file_zip: $('#before_upload_file_zip').prop('checked'),
            after_upload_file_delete: $('#after_upload_file_delete').prop('checked')
          },
          web: {
            enable_web: $('#enable_web').prop('checked'),
            web_host: $('#web_host').val(),
            web_port: Number($('#web_port').val() || 5000)
          },
          chats: readChatSettings()
        };
      }

      function saveSettings() {
        $('#config_save_status').text('Saving...');
        $.ajax({
          url: 'api/settings',
          type: 'post',
          data: JSON.stringify(settingsPayload()),
          contentType: 'application/json',
          dataType: 'json',
          success: function (response) {
            fillSettings(response.settings);
            var text = response.restart_required ? 'Saved. Restart required for: ' + response.restart_fields.join(', ') : 'Saved.';
            $('#config_save_status').text(text);
            layer.msg(text);
          },
          error: function () {
            $('#config_save_status').text('Save failed.');
            layer.msg('Save failed.');
          }
        });
      }

      $.ajax({
        url: 'get_app_version',
        type: 'get',
        dataType: 'text',
        success: function (result) {
          $('#app_version').html(result);
        }
      });

      window.download_state_change = function (e) {
        $.ajax({
          url: 'set_download_state?state=' + e.dataset.value,
          type: 'post',
          dataType: 'text',
          success: function (result) {
            $('#download_state').html(result);
            e.dataset.value = result;
          }
        });
      };

      $('#logout_btn').on('click', function () {
        $.ajax({
          url: 'logout',
          type: 'post',
          success: function () {
            window.location.href = 'login';
          }
        });
      });

      $('#save_config_btn').on('click', saveSettings);

      function syncModeInput() {
        var show = $('#web_task_mode').val() === 'prescan';
        $('#web_task_count').css('display', show ? '' : 'none');
      }
      $('#web_task_mode').on('change', syncModeInput);
      form.on('select()', syncModeInput);
      syncModeInput();

      function submitWebTask() {
        var link = $('#web_task_link').val();
        $('#task_submit_status').text('Submitting...');
        $('#submit_task_btn').prop('disabled', true).addClass('layui-btn-disabled');
        var mode = $('#web_task_mode').val();
        var payload = { link: link, mode: mode };
        if (mode === 'prescan') {
          payload.max_messages = Number($('#web_task_count').val() || 2000);
        }
        $.ajax({
          url: 'api/tasks',
          type: 'post',
          data: JSON.stringify(payload),
          contentType: 'application/json',
          dataType: 'json',
          success: function (response) {
            $('#web_task_link').val('');
            $('#task_submit_status').text('Submitted: ' + response.task_id);
            selectedTaskId = response.task_id;
            selectedTaskType = response.task_type;
            updateTaskDashboard();
          },
          error: function (xhr) {
            var response = xhr.responseJSON || {};
            $('#task_submit_status').text(response.error || 'Submit failed.');
          },
          complete: function () {
            $('#submit_task_btn').prop('disabled', false).removeClass('layui-btn-disabled');
          }
        });
      }

      $('#submit_task_btn').on('click', submitWebTask);
      $('#web_task_link').on('keydown', function (event) {
        if (event.key === 'Enter') {
          event.preventDefault();
          submitWebTask();
        }
      });

      function currentFileText(task) {
        if (!task.current_file) {
          return '';
        }
        var file = task.current_file;
        var name = file.filename || file.message_id || '';
        var progress = Number(file.download_progress || 0);
        return escapeHtml(name) + (progress ? ' (' + progress + '%)' : '');
      }

      function workflowText(task) {
        if (!task.workflow) {
          return '';
        }
        var parts = [];
        if (task.workflow.summary) {
          parts.push(task.workflow.summary);
        }
        if (task.workflow.media_count || task.workflow.selected_count) {
          parts.push('media ' + (task.workflow.selected_count || task.workflow.media_count || 0));
        }
        if (task.workflow.scan_count) {
          parts.push('scanned ' + task.workflow.scan_count);
        }
        return escapeHtml(parts.join(' · '));
      }

      function postTaskAction(taskId, action) {
        $('#task_submit_status').text(action === 'confirm' ? 'Queueing task...' : 'Cancelling task...');
        $.ajax({
          url: 'api/tasks/' + encodeURIComponent(taskId) + '/' + action,
          type: 'post',
          dataType: 'json',
          success: function () {
            $('#task_submit_status').text(action === 'confirm' ? 'Task queued.' : 'Task cancelled.');
            updateTaskDashboard();
            loadTaskDetail(taskId);
          },
          error: function (xhr) {
            var response = xhr.responseJSON || {};
            $('#task_submit_status').text(response.error || 'Task action failed.');
          }
        });
      }

      function postPrescanPackageSelection(taskId, packageId, selected) {
        $.ajax({
          url: 'api/prescans/' + encodeURIComponent(taskId) + '/packages/' + encodeURIComponent(packageId) + '/select',
          type: 'post',
          data: JSON.stringify({ selected: selected }),
          contentType: 'application/json',
          dataType: 'json',
          success: function (response) {
            $('#task_submit_status').text('Selected packages: ' + response.selected_count);
            loadTaskDetail(taskId, 'prescan');
            updateTaskDashboard();
          },
          error: function (xhr) {
            var response = xhr.responseJSON || {};
            $('#task_submit_status').text(response.error || 'Package selection failed.');
          }
        });
      }

      function postSelectAll(taskId, selected) {
        $.ajax({
          url: 'api/prescans/' + encodeURIComponent(taskId) + '/packages/select-all',
          type: 'post', data: JSON.stringify({ selected: selected }),
          contentType: 'application/json', dataType: 'json',
          success: function (response) {
            $('#task_submit_status').text('Selected packages: ' + response.selected_count);
            detailColsType = null; detailSignature = '';
            loadTaskDetail(taskId, 'prescan');
            updateTaskDashboard();
          },
          error: function (xhr) {
            $('#task_submit_status').text((xhr.responseJSON || {}).error || 'Selection failed.');
          }
        });
      }

      $('#prescan_select_all').on('click', function () {
        if (selectedTaskId) { postSelectAll(selectedTaskId, true); }
      });
      $('#prescan_clear_all').on('click', function () {
        if (selectedTaskId) { postSelectAll(selectedTaskId, false); }
      });
      $('#prescan_download').on('click', function () {
        if (selectedTaskId) { postTaskAction(selectedTaskId, 'confirm'); }
      });

      function packageSelectedText(row) {
        return row.selected ? 'yes' : 'no';
      }

      table.render({
        elem: '#task_list',
        id: 'task_list_table',
        data: [],
        title: 'task_list',
        height: 'full-268',
        limit: 10000,
        text: { none: 'No tasks yet — paste a Telegram link above to start a download.' },
        cols: [[
          { field: 'task_id', title: 'task', width: 92 },
          { field: 'source', title: 'source', width: 88 },
          { field: 'task_type', title: 'type', width: 104 },
          { field: 'status', title: 'status', width: 130, templet: statusBadge },
          { field: 'title', title: 'title', minWidth: 180 },
          { field: 'workflow', title: 'preview', minWidth: 200, templet: workflowText },
          { field: 'progress', title: 'progress', width: 118, templet: taskProgressCell },
          { field: 'counts', title: 'ok/fail/skip/up', width: 150, templet: countCell },
          { field: 'current_file', title: 'current file', minWidth: 200, templet: currentFileText },
          { fixed: 'right', title: 'action', width: 132, toolbar: '#task_actions' }
        ]],
        done: function () {
          element.render();
          if (selectedTaskId == null) { return; }
          var rows = this.data || [];
          for (var i = 0; i < rows.length; i++) {
            if (String(rows[i].task_id) === String(selectedTaskId)) {
              $(this.elem).next('.layui-table-view')
                .find('.layui-table-body tr[data-index="' + i + '"]').addClass('layui-table-click');
              break;
            }
          }
        }
      });

      table.render({
        elem: '#task_detail_list',
        id: 'task_detail_list_table',
        data: [],
        title: 'task_detail_list',
        height: 180,
        limit: 10000,
        text: { none: 'Select a task to see its files.' },
        cols: FILE_DETAIL_COLS,
        done: function () { element.render(); }
      });

      table.on('row(task_list)', function (obj) {
        selectedTaskId = obj.data.task_id;
        selectedTaskType = obj.data.task_type;
        obj.tr.addClass('layui-table-click').siblings().removeClass('layui-table-click');
        detailColsType = null;
        detailSignature = '';
        loadTaskDetail(selectedTaskId, selectedTaskType);
      });

      table.on('tool(task_list)', function (obj) {
        if (obj.event === 'confirm' || obj.event === 'cancel') {
          selectedTaskId = obj.data.task_id;
          selectedTaskType = obj.data.task_type;
          postTaskAction(obj.data.task_id, obj.event);
        }
      });

      table.on('tool(task_detail_list)', function (obj) {
        if (obj.event === 'select' || obj.event === 'deselect') {
          postPrescanPackageSelection(selectedTaskId, obj.data.package_id, obj.event === 'select');
        }
      });

      table.render({
        elem: '#download_list',
        id: 'download_list_table',
        data: [],
        title: 'download_list',
        height: 'full-174',
        limit: 10000,
        cols: [[
          { field: 'chat', title: 'chat', width: 140 },
          { field: 'id', title: 'id', width: 100 },
          { field: 'filename', title: 'file name', align: 'center' },
          { field: 'total_size', title: 'total byte', align: 'center', width: 130 },
          {
            field: 'download_progress', title: 'download progress', align: 'center', templet: function (d) {
              var progress = Number(d.download_progress || 0);
              var color = progress >= 100 ? 'layui-bg-green' : (progress > 30 ? 'layui-bg-blue' : 'layui-bg-red');
              return '<div class="layui-progress layui-progress-big" lay-showpercent="true"><div class="layui-progress-bar ' + color + '" lay-percent="' + progress + '%"></div></div>';
            }
          },
          { field: 'download_speed', title: 'download speed', align: 'center', width: 150 }
        ]],
        done: function () { element.render(); }
      });

      table.render({
        elem: '#already_download_list',
        id: 'already_download_list_table',
        data: [],
        title: 'already_download_list',
        height: 'full-174',
        limit: 10000,
        cols: [[
          { field: 'chat', title: 'chat', width: 140 },
          { field: 'id', title: 'id', width: 100 },
          { field: 'filename', title: 'file name', align: 'center' },
          { field: 'total_size', title: 'total size', align: 'center', width: 130 },
          { field: 'save_path', title: 'save path', align: 'center' }
        ]],
        done: function () { element.render(); }
      });

      function updateTaskDashboard() {
        $.ajax({
          url: 'api/task-dashboard',
          type: 'get',
          dataType: 'json',
          success: function (result) {
            $('#summary_active_tasks').text(result.active_task_count || 0);
            $('#summary_completed_tasks').text(result.completed_task_count || 0);
            $('#summary_download_state').text(result.download_state || '');
            $('#summary_download_speed').text(result.download_speed || '0.00 B/s');
            $('#download_speed_title').html(result.download_speed || '0.00 B/s');
            lastTasksById = {};
            (result.tasks || []).forEach(function (task) { lastTasksById[task.task_id] = task; });
            table.reload('task_list_table', { data: result.tasks || [] });
            if (selectedTaskId) {
              loadTaskDetail(selectedTaskId, selectedTaskType);
            }
          }
        });
      }

      function detailSig(items) {
        return (items || []).map(function (row) {
          return [row.message_id || row.package_id, row.status, row.download_progress, row.selected, row.error]
            .join(':');
        }).join('|');
      }

      function showDetailError(taskId) {
        var task = lastTasksById[taskId];
        var banner = $('#task_detail_error');
        if (task && task.error) {
          banner.text(task.error).removeAttr('hidden');
        } else {
          banner.attr('hidden', 'hidden').text('');
        }
      }

      var prescanRows = [];

      function formatBytes(n) {
        n = Number(n || 0);
        var units = ['B', 'KB', 'MB', 'GB', 'TB'];
        var i = 0;
        while (n >= 1024 && i < units.length - 1) { n /= 1024; i++; }
        return n.toFixed(i === 0 ? 0 : 2) + ' ' + units[i];
      }

      function updatePrescanControls(taskId) {
        var selected = prescanRows.filter(function (row) { return row.selected; });
        var media = selected.reduce(function (sum, row) { return sum + Number(row.media_count || 0); }, 0);
        var bytes = selected.reduce(function (sum, row) { return sum + Number(row.known_total_size_bytes || 0); }, 0);
        $('#prescan_summary').text(selected.length + ' packages · ' + media + ' media · ' + formatBytes(bytes));
        $('#prescan_controls').removeAttr('hidden');
      }

      function hidePrescanControls() {
        $('#prescan_controls').attr('hidden', 'hidden');
        prescanRows = [];
      }

      function loadTaskDetail(taskId, taskType) {
        showDetailError(taskId);
        if (taskType === 'prescan') {
          $.ajax({
            url: 'api/prescans/' + encodeURIComponent(taskId) + '/packages?page=1&page_size=50',
            type: 'get', dataType: 'json',
            success: function (result) {
              var items = result.items || [];
              var sig = 'prescan:' + detailSig(items);
              if (detailColsType === 'prescan' && sig === detailSignature) { return; }
              prescanRows = items;
              updatePrescanControls(taskId);
              var reload = { data: items };
              if (detailColsType !== 'prescan') {
                reload.cols = [[
                  { field: 'package_id', title: 'package', width: 100 },
                  { field: 'selected', title: 'selected', width: 100, templet: packageSelectedText },
                  { field: 'start_message_id', title: 'start', width: 110 },
                  { field: 'end_message_id', title: 'end', width: 110 },
                  { field: 'media_count', title: 'media', width: 90 },
                  { field: 'known_total_size', title: 'known size', width: 120 },
                  { field: 'title', title: 'title', minWidth: 220 },
                  { fixed: 'right', title: 'action', width: 110, toolbar: '#prescan_package_actions' }
                ]];
              }
              table.reload('task_detail_list_table', reload);
              detailColsType = 'prescan';
              detailSignature = sig;
            },
            error: function () {
              hidePrescanControls();
              table.reload('task_detail_list_table', { data: [] });
              detailColsType = 'prescan'; detailSignature = '';
            }
          });
          return;
        }
        hidePrescanControls();
        $.ajax({
          url: 'api/tasks/' + encodeURIComponent(taskId) + '/files?page=1&page_size=50',
          type: 'get', dataType: 'json',
          success: function (result) {
            var items = result.items || [];
            var sig = 'files:' + detailSig(items);
            if (detailColsType === 'files' && sig === detailSignature) { return; }
            var reload = { data: items };
            if (detailColsType !== 'files') { reload.cols = FILE_DETAIL_COLS; }
            table.reload('task_detail_list_table', reload);
            detailColsType = 'files';
            detailSignature = sig;
          },
          error: function () {
            table.reload('task_detail_list_table', { data: [] });
            detailColsType = 'files'; detailSignature = '';
            selectedTaskId = null; selectedTaskType = null;
          }
        });
      }

      function updateDownloadList() {
        $.ajax({
          url: 'get_download_list?already_down=false',
          type: 'get',
          dataType: 'json',
          success: function (result) {
            table.reload('download_list_table', {
              data: result.filter(function (item) {
                return Number(item.download_progress) < 100;
              })
            });
          }
        });
      }

      function updateDownloadedList() {
        $.ajax({
          url: 'get_download_list?already_down=true',
          type: 'get',
          dataType: 'json',
          success: function (result) {
            table.reload('already_download_list_table', { data: result });
          }
        });
      }

      function updateDownloadStatus() {
        $.ajax({
          url: 'get_download_status',
          type: 'get',
          dataType: 'json',
          success: function (result) {
            $('#download_speed_title').html(result.download_speed);
          }
        });
      }

      function setActiveTimers(tabIndex) {
        clearInterval(taskDashboardTimer);
        clearInterval(downloadListTimer);
        clearInterval(downloadedListTimer);
        if (tabIndex === 0) {
          updateTaskDashboard();
          taskDashboardTimer = self.setInterval(updateTaskDashboard, 1000);
        }
        if (tabIndex === 1) {
          updateDownloadList();
          downloadListTimer = self.setInterval(updateDownloadList, 1000);
          updateDownloadedList();
          downloadedListTimer = self.setInterval(updateDownloadedList, 1000);
        }
        if (tabIndex === 2 && !settingsLoaded) {
          loadSettings();
        }
      }

      element.on('tab(telegram_media_downloader)', function (data) {
        setActiveTimers(data.index);
      });

      updateTaskDashboard();
      updateDownloadStatus();
      taskDashboardTimer = self.setInterval(updateTaskDashboard, 1000);
      statusTimer = self.setInterval(updateDownloadStatus, 1000);
    });
  </script>
</body>

</html>
